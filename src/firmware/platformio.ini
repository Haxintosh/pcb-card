[env:ch32v003]
platform = ch32v
board = genericCH32V003F4U6
framework = arduino ; noneos-sdk
; board_build.clock_source = hsi
; board_build.f_cpu = 24000000L
; build_flags = -DSYSCLK_FREQ_24MHZ_HSI=24000000
; board_build.cpp_support = yes


[env:ch32x035]
platform = ch32v
board = genericCH32X035F8U6
framework = noneos-sdk

